<h1>Bienvenido al Dashboard</h1>

<button onclick="logout()">
  Cerrar sesión
</button>

<script>

auth.onAuthStateChanged((user)=>{

  if(!user){
    window.location.href = "login.html";
  }

});

function logout(){

  auth.signOut();

}
