<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>App Técnico</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f0f2f5;
      padding:15px;
    }

    .header{
      background:white;
      padding:20px;
      border-radius:15px;
      margin-bottom:20px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      box-shadow:0 4px 10px rgba(0,0,0,0.05);
    }

    .header h1{
      font-size:22px;
      color:#2c3e50;
    }

    .logout-btn{
      background:#e74c3c;
      color:white;
      border:none;
      padding:10px 15px;
      border-radius:10px;
      cursor:pointer;
      font-weight:bold;
    }

    .orden-card{
      background:white;
      padding:20px;
      border-radius:15px;
      margin-bottom:20px;
      box-shadow:0 4px 10px rgba(0,0,0,0.05);
    }

    .orden-card h2{
      color:#2c3e50;
      margin-bottom:10px;
    }

    .orden-card p{
      margin-bottom:10px;
      color:#34495e;
    }

    .badge{
      display:inline-block;
      padding:8px 12px;
      border-radius:20px;
      font-size:14px;
      color:white;
      font-weight:bold;
      margin-bottom:15px;
    }

    .pendiente{
      background:#f39c12;
    }

    .proceso{
      background:#3498db;
    }

    .completada{
      background:#27ae60;
    }

    textarea{
      width:100%;
      padding:12px;
      border-radius:10px;
      border:1px solid #dcdde1;
      margin-top:10px;
      margin-bottom:15px;
      resize:none;
      height:100px;
    }

    input[type='file']{
      margin-bottom:15px;
    }

    .btn{
      width:100%;
      border:none;
      padding:14px;
      border-radius:10px;
      color:white;
      font-size:15px;
      font-weight:bold;
      cursor:pointer;
      margin-bottom:10px;
    }

    .btn-iniciar{
      background:#3498db;
    }

    .btn-finalizar{
      background:#27ae60;
    }

  </style>

</head>

<body>

<div class="header">

  <h1>App Técnico</h1>

  <button class="logout-btn" onclick="logout()">
    Salir
  </button>

</div>

<div id="contenedorOrdenes">

</div>

<script src="js/firebase.js"></script>
<script src="js/tecnico.js"></script>

</body>
</html>
