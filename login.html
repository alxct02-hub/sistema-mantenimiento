<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login - Sistema Mantenimiento</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{

      background:#121212;

      height:100vh;

      display:flex;

      justify-content:center;

      align-items:center;

    }

    .login-container{

      width:100%;
      max-width:420px;

      background:#1f1f1f;

      padding:40px;

      border-radius:15px;

      box-shadow:0 5px 20px rgba(0,0,0,0.4);

      color:white;

      text-align:center;

    }

    .logo{

      width:140px;

      margin-bottom:20px;

    }

    h1{

      color:#f5b400;

      margin-bottom:10px;

    }

    p{

      color:#ccc;

      margin-bottom:30px;

    }

    .form-group{

      margin-bottom:20px;

      text-align:left;

    }

    label{

      display:block;

      margin-bottom:8px;

      font-weight:bold;

    }

    input{

      width:100%;

      padding:14px;

      border:none;

      border-radius:10px;

      font-size:16px;

    }

    button{

      width:100%;

      padding:14px;

      border:none;

      border-radius:10px;

      background:#f5b400;

      color:black;

      font-size:16px;

      font-weight:bold;

      cursor:pointer;

      transition:0.3s;

    }

    button:hover{

      opacity:0.8;

    }

  </style>

</head>

<body>

<div class="login-container">

  <img
    src="./img/logo.png"
    alt="Logo"
    class="logo"
  >

  <h1>Sistema Mantenimiento</h1>

  <p>Concretera del Sureste</p>

  <form id="loginForm">

    <div class="form-group">

      <label>Correo</label>

      <input
        type="email"
        id="email"
        required
      >

    </div>

    <div class="form-group">

      <label>Contraseña</label>

      <input
        type="password"
        id="password"
        required
      >

    </div>

    <button type="submit">

      Iniciar Sesión

    </button>

  </form>

</div>

<script type="module" src="./js/auth.js"></script>

</body>
</html>
