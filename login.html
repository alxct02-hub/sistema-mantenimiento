<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Login - Sistema Mantenimiento</title>

    <!-- FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>

    <!-- TAILWIND -->
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-900 min-h-screen flex items-center justify-center">

    <!-- LOGIN -->
    <div class="bg-gray-800 text-white p-10 rounded-2xl shadow-2xl w-full max-w-md">

        <!-- LOGO -->
        <div class="text-center mb-8">

            <img
                src="./img/logo.png"
                alt="Logo"
                class="w-28 h-28 object-contain mx-auto mb-4 bg-white rounded-xl p-2"
            >

            <h1 class="text-3xl font-bold">

                Sistema Mantenimiento

            </h1>

            <p class="text-gray-400 mt-2">

                Concretera del Sureste

            </p>

        </div>

        <!-- ERROR -->
        <div
            id="errorBox"
            class="hidden bg-red-500 text-white p-3 rounded-lg mb-5 text-center"
        >

        </div>

        <!-- FORM -->
        <form id="loginForm">

            <!-- CORREO -->
            <div class="mb-5">

                <label class="block mb-2 font-semibold">

                    Correo

                </label>

                <input
                    type="email"
                    id="correo"
                    class="w-full rounded-lg p-3 text-black"
                    required
                >

            </div>

            <!-- PASSWORD -->
            <div class="mb-6">

                <label class="block mb-2 font-semibold">

                    Contraseña

                </label>

                <input
                    type="password"
                    id="password"
                    class="w-full rounded-lg p-3 text-black"
                    required
                >

            </div>

            <!-- BOTÓN -->
            <button
                type="submit"
                class="w-full bg-yellow-500 hover:bg-yellow-400 text-black py-3 rounded-lg font-bold text-lg"
            >

                Ingresar

            </button>

            <!-- LOADING -->
            <div
                id="loadingText"
                class="hidden text-center mt-4 text-gray-300"
            >

                Ingresando...

            </div>

        </form>

    </div>

    <!-- FIREBASE CONFIG -->
    <script src="./js/firebase-config.js"></script>

    <!-- AUTH -->
    <script src="./js/auth.js"></script>

</body>

</html>
