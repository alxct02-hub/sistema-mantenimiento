<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">
  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
      <title>Login - Sistema Mantenimiento</title>
      
        <style>
        
            *{
                  margin:0;
                        padding:0;
                              box-sizing:border-box;
                                    font-family:Arial, sans-serif;
                                        }
                                        
                                            body{
                                            
                                                  background:#121212;
                                                  
                                                        height:100vh;
                                                        
                                                              display:flex;
                                                              
                                                                    justify-content:center;
                                                                    
                                                                          align-items:center;
                                                                          
                                                                              }
                                                                              
                                                                                  .login-container{
                                                                                  
                                                                                        width:100%;
                                                                                              max-width:400px;
                                                                                              
                                                                                                    background:#1f1f1f;
                                                                                                    
                                                                                                          padding:40px;
                                                                                                          
                                                                                                                border-radius:15px;
                                                                                                                
                                                                                                                      box-shadow:0 5px 20px rgba(0,0,0,0.3);
                                                                                                                      
                                                                                                                            color:white;
                                                                                                                            
                                                                                                                                }
                                                                                                                                
                                                                                                                                    .logo{
                                                                                                                                    
                                                                                                                                          text-align:center;
                                                                                                                                          
                                                                                                                                                margin-bottom:25px;
                                                                                                                                                
                                                                                                                                                    }
                                                                                                                                                    
                                                                                                                                                        .logo h1{
                                                                                                                                                        
                                                                                                                                                              color:#f5b400;
                                                                                                                                                              
                                                                                                                                                                    font-size:28px;
                                                                                                                                                                    
                                                                                                                                                                          margin-bottom:10px;
                                                                                                                                                                          
                                                                                                                                                                              }
                                                                                                                                                                              
                                                                                                                                                                                  .logo p{
                                                                                                                                                                                  
                                                                                                                                                                                        color:#ccc;
                                                                                                                                                                                        
                                                                                                                                                                                            }
                                                                                                                                                                                            
                                                                                                                                                                                                .form-group{
                                                                                                                                                                                                
                                                                                                                                                                                                      margin-bottom:20px;
                                                                                                                                                                                                      
                                                                                                                                                                                                          }
                                                                                                                                                                                                          
                                                                                                                                                                                                              label{
                                                                                                                                                                                                              
                                                                                                                                                                                                                    display:block;
                                                                                                                                                                                                                    
                                                                                                                                                                                                                          margin-bottom:8px;
                                                                                                                                                                                                                          
                                                                                                                                                                                                                                font-weight:bold;
                                                                                                                                                                                                                                
                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                        input{
                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                              width:100%;
                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                    padding:14px;
                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                          border:none;
                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                border-radius:10px;
                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                      font-size:16px;
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                          }
                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                              button{
                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                    width:100%;
                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                          padding:14px;
                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                border:none;
                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                      border-radius:10px;
                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                            background:#f5b400;
                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                  color:black;
                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                        font-size:16px;
                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                              font-weight:bold;
                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                    cursor:pointer;
                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                          transition:0.3s;
                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                              }
                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                  button:hover{
                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                        opacity:0.8;
                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                .error{
                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                      background:#e74c3c;
                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                            color:white;
                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                  padding:10px;
                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                        border-radius:8px;
                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                              margin-bottom:15px;
                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                    display:none;
                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                            .loading{
                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                  text-align:center;
                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                        margin-top:15px;
                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                              color:#ccc;
                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                    display:none;
                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                          </style>
                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                          </head>
                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                          <body>
                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                          <div class="login-container">
                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                            <div class="logo">
                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                <h1>Sistema Mantenimiento</h1>
                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                    <p>Concretera del Sureste</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                      </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="error" id="errorBox"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                          <form id="loginForm">
                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                              <div class="form-group">
                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <label>Correo</label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <input type="email" id="email" required>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                              </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <div class="form-group">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <label>Contraseña</label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <input type="password" id="password" required>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <button type="submit">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            Iniciar Sesión
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <div class="loading" id="loadingText">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          Ingresando...
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </form>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <script type="module" src="./js/auth.js"></script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </html>
