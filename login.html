<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Login</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-900 min-h-screen flex items-center justify-center">

    <!-- LOGIN -->
    <div class="bg-white rounded-2xl shadow-2xl p-10 w-full max-w-md">

        <!-- LOGO -->
        <div class="text-center mb-8">

            <img
                src="./img/logo.png"
                class="w-28 h-28 mx-auto object-contain mb-4"
            >

            <h1 class="text-3xl font-bold text-gray-800">

                Sistema Mantenimiento

            </h1>

            <p class="text-gray-500 mt-2">

                Concretera del Sureste

            </p>

        </div>

        <!-- ERROR -->
        <div
            id="error"
            class="hidden bg-red-500 text-white p-3 rounded-lg mb-5 text-center"
        >

        </div>

        <!-- FORM -->
        <form id="loginForm">

            <!-- USUARIO -->
            <div class="mb-5">

                <label class="block mb-2 font-semibold">

                    Usuario

                </label>

                <input
                    type="text"
                    id="usuario"
                    class="w-full border rounded-lg p-3"
                    required
                >

            </div>

            <!-- PASSWORD -->
            <div class="mb-6">

                <label class="block mb-2 font-semibold">

                    Contraseña

                </label>

                <input
                    type="password"
                    id="password"
                    class="w-full border rounded-lg p-3"
                    required
                >

            </div>

            <!-- BOTÓN -->
            <button
                type="submit"
                class="w-full bg-yellow-500 hover:bg-yellow-400 text-black py-3 rounded-lg font-bold text-lg"
            >

                Ingresar

            </button>

        </form>

    </div>

    <!-- AUTH -->
    <script type="module" src="./js/auth.js"></script>

</body>

</html>
