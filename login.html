<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login - Sistema Mantenimiento</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{

      background:#121212;

      height:100vh;

      display:flex;

      justify-content:center;

      align-items:center;

    }

    .login-container{

      width:100%;
      max-width:420px;

      background:#1f1f1f;

      padding:40px;

      border-radius:15px;

      box-shadow:0 5px 20px rgba(0,0,0,0.4);

      color:white;

      text-align:center;

    }

    .logo{

      width:140px;

      margin-bottom:20px;

    }

    h1{

      color:#f5b400;

      margin-bottom:10px;

      font-size:28px;

    }

    p{

      color:#ccc;

      margin-bottom:30px;

      font-size:14px;

    }

    .form-group{

      margin-bottom:20px;

      text-align:left;

    }

    label{

      display:block;

      margin-bottom:8px;

      font-weight:bold;

      font-size:14px;

    }

    input{

      width:100%;

      padding:14px;

      border:none;

      border-radius:10px;

      font-size:16px;

      background:#2a2a2a;

      color:white;

      transition:0.3s;

      -webkit-user-select: none;
      user-select: none;

    }

    input:focus{

      outline:none;

      background:#333;

      box-shadow:0 0 0 2px #f5b400;

    }

    input::placeholder{

      color:#888;

    }

    button{

      width:100%;

      padding:14px;

      border:none;

      border-radius:10px;

      background:#f5b400;

      color:black;

      font-size:16px;

      font-weight:bold;

      cursor:pointer;

      transition:0.3s;

      margin-top:10px;

    }

    button:hover:not(:disabled){

      opacity:0.9;

      background:#ffb800;

      transform:translateY(-2px);

      box-shadow:0 5px 15px rgba(245, 180, 0, 0.3);

    }

    button:disabled{

      opacity:0.6;

      cursor:not-allowed;

    }

    #loginError{

      display:none;

      margin-bottom:15px;

      padding:12px;

      background:#fadbd8;

      color:#e74c3c;

      border-radius:5px;

      font-size:14px;

      border-left:4px solid #e74c3c;

    }

    .info-box{

      background:#2a2a2a;

      padding:15px;

      border-radius:10px;

      margin-top:20px;

      font-size:12px;

      color:#aaa;

      border-left:4px solid #3498db;

    }

    .info-box strong{

      color:#f5b400;

      display:block;

      margin-bottom:5px;

    }

  </style>

</head>

<body>

<div class="login-container">

  <img
    src="./img/logo.png"
    alt="Logo"
    class="logo"
  >

  <h1>Sistema Mantenimiento</h1>

  <p>Concretera del Sureste</p>

  <form id="loginForm" novalidate>

    <div id="loginError"></div>

    <div class="form-group">

      <label for="usuario">👤 Usuario</label>

      <input
        type="text"
        id="usuario"
        placeholder="Ingresa tu usuario"
        required
      >

    </div>

    <div class="form-group">

      <label for="password">🔒 Contraseña</label>

      <input
        type="password"
        id="password"
        placeholder="Ingresa tu contraseña"
        required
      >

    </div>

    <button type="submit">
      Iniciar Sesión
    </button>

  </form>

  <div class="info-box">
    <strong>⚠️ Acceso Restringido</strong>
    Usa tus credenciales de usuario y contraseña para acceder al sistema.
  </div>

</div>

<script type="module" src="./js/auth.js"></script>

</body>
</html>
