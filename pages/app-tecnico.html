<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>App Técnico - Sistema Mantenimiento</title>

    <!-- PWA -->
    <link rel="manifest" href="../manifest-tecnico.json">
    <meta name="theme-color" content="#111827">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 min-h-screen">

    <!-- HEADER -->
    <header class="bg-gray-900 text-white p-4 shadow-lg sticky top-0 z-10">

        <div class="flex items-center justify-between gap-4">

            <div class="flex items-center gap-3">

                <!-- LOGO -->
                <img
                    src="../img/logo.png"
                    alt="Logo"
                    class="w-12 h-12 object-contain bg-white rounded-lg p-1"
                >

                <div>
                    <h1 class="text-xl font-bold leading-tight">App Técnico</h1>
                    <p class="text-gray-400 text-xs">Sistema de Mantenimiento</p>
                </div>

            </div>

            <!-- INFO TÉCNICO + SALIR -->
            <div class="flex items-center gap-3">

                <!-- BADGE TÉCNICO -->
                <div id="infoTecnico" class="text-right hidden sm:block">
                    <p id="nombreTecnico" class="text-sm font-bold text-yellow-400"></p>
                    <p id="idTecnico" class="text-xs text-gray-400"></p>
                </div>

                <!-- BOTÓN CERRAR SESIÓN -->
                <button
                    id="btnCerrarSesionTecnico"
                    class="bg-red-600 hover:bg-red-700 text-white px-3 py-2 rounded-lg font-bold text-sm transition"
                >
                    Salir
                </button>

            </div>

        </div>

        <!-- INFO TÉCNICO EN MÓVIL -->
        <div class="mt-3 sm:hidden bg-gray-800 rounded-lg px-4 py-2 flex items-center justify-between">
            <div>
                <p id="nombreTecnicoMobile" class="text-sm font-bold text-yellow-400"></p>
                <p id="idTecnicoMobile" class="text-xs text-gray-400"></p>
            </div>
            <span class="text-xs text-gray-500">Sesión activa</span>
        </div>

    </header>

    <!-- CONTENIDO -->
    <main class="p-4 max-w-2xl mx-auto">

        <!-- TITULO -->
        <div class="mb-6 mt-2">

            <h2 class="text-2xl font-bold text-gray-800">
                Órdenes de Servicio
            </h2>

            <p class="text-gray-500 mt-1 text-sm">
                Selecciona una orden pendiente para iniciar el trabajo
            </p>

        </div>

        <!-- CONTENEDOR ÓRDENES -->
        <div id="contenedorOrdenes" class="space-y-5">
            <!-- Cargado por JS -->
        </div>

    </main>

    <!-- FIREBASE + LÓGICA -->
    <script type="module">
        import { db } from '../js/firebase-config.js';
        import {
            collection,
            getDocs,
            doc,
            updateDoc
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // ======================================
        // VERIFICAR SESIÓN
        // ======================================

        const sesionGuardada = localStorage.getItem('sesion');
        const tokenGuardado = localStorage.getItem('token');

        if (!sesionGuardada || !tokenGuardado) {
            window.location.href = '../login.html';
        }

        const sesionActual = sesionGuardada ? JSON.parse(sesionGuardada) : null;

        if (!sesionActual || sesionActual.rol !== 'tecnico') {
            localStorage.removeItem('sesion');
            localStorage.removeItem('token');
            window.location.href = '../login.html';
        }

        // ======================================
        // MOSTRAR INFO DEL TÉCNICO
        // ======================================

        const nombre = sesionActual ? sesionActual.nombre : '';
        const tecnicoId = sesionActual ? (sesionActual.tecnicoId || 'Sin ID') : '';

        document.getElementById('nombreTecnico').textContent = nombre;
        document.getElementById('idTecnico').textContent = tecnicoId;

        // Mobile
        const nombreMobile = document.getElementById('nombreTecnicoMobile');
        const idMobile = document.getElementById('idTecnicoMobile');
        if (nombreMobile) nombreMobile.textContent = nombre;
        if (idMobile) idMobile.textContent = tecnicoId;

        // ======================================
        // CERRAR SESIÓN
        // ======================================

        document.getElementById('btnCerrarSesionTecnico').addEventListener('click', () => {
            localStorage.removeItem('sesion');
            localStorage.removeItem('token');
            window.location.href = '../login.html';
        });

        // ======================================
        // API IMGBB
        // ======================================

        const API_KEY = '666f2e6d2f71a9117e585dd3ec86aa60';
        const contenedor = document.getElementById('contenedorOrdenes');

        // ======================================
        // CARGAR ÓRDENES
        // ======================================

        async function cargarOrdenes() {

            contenedor.innerHTML = `
                <div class="text-center py-10 text-gray-400">
                    <p class="text-lg">Cargando órdenes...</p>
                </div>
            `;

            try {

                const snapshot = await getDocs(collection(db, 'ordenes'));

                contenedor.innerHTML = '';
                let hayOrdenes = false;

                snapshot.forEach((documento) => {

                    const orden = documento.data();
                    const id = documento.id;

                    if (orden.estado === 'Completada') return;

                    hayOrdenes = true;

                    const colorPrioridad =
                        orden.prioridad === 'Alta' ? 'text-red-600' :
                        orden.prioridad === 'Media' ? 'text-yellow-600' :
                        'text-green-600';

                    const colorEstado =
                        orden.estado === 'Pendiente' ? 'bg-yellow-100 text-yellow-700' :
                        orden.estado === 'En proceso' ? 'bg-blue-100 text-blue-700' :
                        'bg-green-100 text-green-700';

                    const esOrdenMia =
                        orden.tecnicoUsuario === sesionActual.usuario ||
                        orden.tecnicoId === sesionActual.tecnicoId;

                    const btnIniciarDisabled = orden.estado !== 'Pendiente' ? 'disabled' : '';
                    const btnFinalizarDisabled = orden.estado !== 'En proceso' ? 'disabled' : '';
                    const opacityIniciar = orden.estado !== 'Pendiente' ? 'opacity-40 cursor-not-allowed' : '';
                    const opacityFinalizar = orden.estado !== 'En proceso' ? 'opacity-40 cursor-not-allowed' : '';

                    const card = document.createElement('div');
                    card.className = `bg-white rounded-xl shadow p-5 ${esOrdenMia ? 'border-l-4 border-blue-500' : ''}`;

                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="text-xl font-bold">${orden.folio}</h3>
                                <p class="text-gray-500 text-sm">${orden.equipo}</p>
                                ${esOrdenMia ? `<span class="text-xs text-blue-600 font-semibold">✔ Tú estás trabajando esta orden</span>` : ''}
                            </div>
                            <span class="px-3 py-1 rounded-full text-sm font-bold ${colorEstado}">
                                ${orden.estado}
                            </span>
                        </div>

                        <div class="space-y-1 text-sm text-gray-700">
                            <p><strong>Área:</strong> ${orden.area || '-'}</p>
                            <p><strong>Técnico:</strong> ${orden.tecnico || '<span class="italic text-gray-400">Sin asignar</span>'}</p>
                            <p><strong>Prioridad:</strong> <span class="${colorPrioridad} font-bold">${orden.prioridad}</span></p>
                            <p><strong>Tipo:</strong> ${orden.tipo || '-'}</p>
                        </div>

                        <div class="mt-3">
                            <p class="font-bold text-sm mb-1">Descripción:</p>
                            <p class="text-gray-600 text-sm">${orden.descripcion || '-'}</p>
                        </div>

                        <div class="mt-3 bg-gray-50 rounded-lg p-3 text-sm">
                            <p><strong>Inicio:</strong> ${orden.horaInicio || '-'}</p>
                            <p><strong>Fin:</strong> ${orden.horaFin || '-'}</p>
                        </div>

                        <div class="mt-4">
                            <label class="block mb-1 font-bold text-sm">Observaciones</label>
                            <textarea
                                id="obs-${id}"
                                class="w-full border rounded-lg p-3 text-sm"
                                rows="3"
                                placeholder="Escribe observaciones del trabajo..."
                            >${orden.observaciones || ''}</textarea>
                        </div>

                        <div class="mt-3">
                            <label class="block mb-1 font-bold text-sm">Evidencia fotográfica</label>
                            <input
                                type="file"
                                accept="image/*"
                                capture="environment"
                                id="file-${id}"
                                class="w-full border rounded-lg p-2 text-sm"
                            >
                        </div>

                        ${orden.evidencia ? `
                            <div class="mt-3">
                                <img src="${orden.evidencia}" class="w-full rounded-lg shadow">
                            </div>
                        ` : ''}

                        <div class="grid grid-cols-2 gap-3 mt-5">
                            <button
                                onclick="iniciarOrden('${id}')"
                                class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 rounded-lg transition ${opacityIniciar}"
                                ${btnIniciarDisabled}
                            >
                                ▶ Iniciar
                            </button>
                            <button
                                onclick="finalizarOrden('${id}')"
                                class="bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-lg transition ${opacityFinalizar}"
                                ${btnFinalizarDisabled}
                            >
                                ✓ Finalizar
                            </button>
                        </div>
                    `;

                    contenedor.appendChild(card);

                });

                if (!hayOrdenes) {
                    contenedor.innerHTML = `
                        <div class="bg-white rounded-xl shadow p-10 text-center">
                            <p class="text-gray-400 text-lg">No hay órdenes activas en este momento</p>
                        </div>
                    `;
                }

            } catch (error) {
                console.error('Error:', error);
                contenedor.innerHTML = `
                    <div class="bg-white rounded-xl shadow p-8 text-center">
                        <p class="text-red-500">Error al cargar órdenes. Intenta de nuevo.</p>
                    </div>
                `;
            }

        }

        // ======================================
        // INICIAR ORDEN
        // ======================================

        window.iniciarOrden = async function (id) {
            if (!confirm(`¿Iniciar esta orden?\n\nEl sistema registrará:\nTécnico: ${sesionActual.nombre}\nID: ${sesionActual.tecnicoId || 'Sin ID'}`)) return;

            try {
                const horaInicio = new Date().toLocaleString('es-MX');
                await updateDoc(doc(db, 'ordenes', id), {
                    estado: 'En proceso',
                    horaInicio,
                    tecnico: sesionActual.nombre,
                    tecnicoId: sesionActual.tecnicoId || '',
                    tecnicoUsuario: sesionActual.usuario
                });

                alert(`✅ Orden iniciada\nTécnico: ${sesionActual.nombre} (${sesionActual.tecnicoId || 'Sin ID'})`);
                cargarOrdenes();

            } catch (error) {
                console.error(error);
                alert('❌ Error al iniciar la orden');
            }
        };

        // ======================================
        // FINALIZAR ORDEN
        // ======================================

        window.finalizarOrden = async function (id) {
            const observaciones = document.getElementById(`obs-${id}`).value;
            const archivo = document.getElementById(`file-${id}`).files[0];

            let imagenURL = '';

            try {
                if (archivo) {
                    const formData = new FormData();
                    formData.append('image', archivo);
                    const response = await fetch(`https://api.imgbb.com/1/upload?key=${API_KEY}`, {
                        method: 'POST',
                        body: formData
                    });
                    const data = await response.json();
                    imagenURL = data.data.url;
                }

                const horaFin = new Date().toLocaleString('es-MX');

                await updateDoc(doc(db, 'ordenes', id), {
                    estado: 'Completada',
                    horaFin,
                    observaciones,
                    evidencia: imagenURL,
                    tecnico: sesionActual.nombre,
                    tecnicoId: sesionActual.tecnicoId || '',
                    tecnicoUsuario: sesionActual.usuario
                });

                alert('✅ Orden finalizada correctamente');
                cargarOrdenes();

            } catch (error) {
                console.error(error);
                alert('❌ Error al finalizar la orden');
            }
        };

        // Cargar al inicio
        cargarOrdenes();

    </script>

    <!-- PWA -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker
                .register('../service-worker-tecnico.js')
                .then(() => console.log('✅ PWA Técnico instalada'))
                .catch((error) => console.error('❌ Error PWA:', error));
        }
    </script>

</body>

</html>
