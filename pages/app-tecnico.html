<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>App Técnico</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<!-- Header -->
<header class="bg-gray-900 text-white p-5 shadow-lg">

    <div class="flex items-center gap-4">

        <img
            src="../img/logo.png"
            alt="Logo"
            class="w-14 h-14 object-contain bg-white rounded-lg p-1"
        >

        <div>

            <h1 class="text-xl font-bold">

                App Técnico

            </h1>

            <p class="text-sm text-gray-300">

                Concretera del Sureste

            </p>

        </div>

    </div>

</header>

<!-- Contenido -->
<main class="p-4">

    <!-- Título -->
    <div class="mb-6">

        <h2 class="text-2xl font-bold text-gray-800">

            Órdenes Asignadas

        </h2>

        <p class="text-gray-500">

            Visualización operativa de mantenimiento

        </p>

    </div>

    <!-- Contenedor -->
    <div
        id="contenedorOrdenes"
        class="space-y-5"
    >

    </div>

</main>

<script type="module" src="../js/app-tecnico.js"></script>

</body>
</html>
