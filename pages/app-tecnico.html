<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>App Técnico</title>

    <!-- PWA -->
    <link
        rel="manifest"
        href="../manifest-tecnico.json"
    >

    <meta
        name="theme-color"
        content="#111827"
    >

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 min-h-screen">

    <!-- HEADER -->
    <header class="bg-gray-900 text-white p-4 shadow-lg">

        <div class="flex items-center justify-between gap-4">

            <div class="flex items-center gap-4">

                <!-- LOGO -->
                <img
                    src="../img/logo.png"
                    alt="Logo"
                    class="w-14 h-14 object-contain bg-white rounded-lg p-1"
                >

                <!-- TITULOS -->
                <div>

                    <h1 class="text-2xl font-bold">

                        App Técnico

                    </h1>

                    <p class="text-gray-400 text-sm">

                        Sistema de Mantenimiento

                    </p>

                </div>

            </div>

            <!-- BOTÓN ATRÁS -->
            <button
                onclick="window.location.href='./dashboard.html'"
                class="bg-yellow-500 hover:bg-yellow-600 text-black px-4 py-2 rounded-lg font-bold transition"
            >

                ← Atrás

            </button>

        </div>

    </header>

    <!-- CONTENIDO -->
    <main class="p-4">

        <!-- TITULO -->
        <div class="mb-6">

            <h2 class="text-3xl font-bold text-gray-800">

                Órdenes Asignadas

            </h2>

            <p class="text-gray-500 mt-1">

                Gestión operativa de mantenimiento

            </p>

        </div>

        <!-- CONTENEDOR ÓRDENES -->
        <div
            id="contenedorOrdenes"
            class="space-y-5"
        >

            <!-- JS -->

        </div>

    </main>

    <!-- FIREBASE -->
    <script type="module" src="../js/app-tecnico.js"></script>

    <!-- PWA -->
    <script>

        // ======================================
        // REGISTRAR SERVICE WORKER
        // ======================================

        if('serviceWorker' in navigator){

            navigator.serviceWorker

            .register('../service-worker-tecnico.js')

            .then(() => {

                console.log(

                    '✅ PWA Técnico instalada'

                );

            })

            .catch((error) => {

                console.error(

                    '❌ Error PWA:',
                    error

                );

            });

        }

    </script>

</body>

</html>
