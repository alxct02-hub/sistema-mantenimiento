<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Técnicos</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<div class="flex min-h-screen">

    <!-- Sidebar -->
    <aside class="w-72 bg-gray-900 text-white flex flex-col">

        <!-- Logo -->
        <div class="p-6 border-b border-gray-700">

            <div class="flex items-center gap-4">

                <img
                    src="../img/logo.png"
                    alt="Logo"
                    class="w-16 h-16 object-contain bg-white rounded-lg p-1"
                >

                <div>

                    <h1 class="font-bold text-lg">

                        Sistema Mantenimiento

                    </h1>

                    <p class="text-gray-400 text-sm">

                        Concretera del Sureste

                    </p>

                </div>

            </div>

        </div>

        <!-- Menú -->
        <nav class="flex-1 p-4">

            <ul class="space-y-3">

                <li>

                    <a
                        href="./dashboard.html"
                        class="block hover:bg-gray-700 px-4 py-3 rounded-lg transition"
                    >

                        📊 Dashboard

                    </a>

                </li>

                <li>

                    <a
                        href="./admin-presolicitudes.html"
                        class="block hover:bg-gray-700 px-4 py-3 rounded-lg transition"
                    >

                        📝 Presolicitudes

                    </a>

                </li>

                <li>

                    <a
                        href="./nueva-orden.html"
                        class="block hover:bg-gray-700 px-4 py-3 rounded-lg transition"
                    >

                        🛠 Nueva Orden

                    </a>

                </li>

                <li>

                    <a
                        href="./historial.html"
                        class="block hover:bg-gray-700 px-4 py-3 rounded-lg transition"
                    >

                        📁 Historial

                    </a>

                </li>

                <li>

                    <a
                        href="./tecnicos.html"
                        class="block bg-yellow-500 text-black px-4 py-3 rounded-lg font-bold"
                    >

                        👷 Técnicos

                    </a>

                </li>

                <li>

                    <a
                        href="./reportes.html"
                        class="block hover:bg-gray-700 px-4 py-3 rounded-lg transition"
                    >

                        📑 Reportes

                    </a>

                </li>

            

                <li>

                    <a
                        href="./bitacora.html"
                        class="block hover:bg-gray-700 px-4 py-3 rounded-lg transition"
                    >

                        📋 Bitácora

                    </a>

                </li>

            </ul>

        </nav>

        <!-- Salir -->
        <div class="p-4 border-t border-gray-700">

            <a
                href="../login.html"
                class="block bg-red-500 hover:bg-red-600 text-center py-3 rounded-lg font-bold transition"
            >

                Cerrar Sesión

            </a>

        </div>

    </aside>

    <!-- Contenido -->
    <main class="flex-1 p-8">

        <!-- Header -->
        <div class="mb-8">

            <h2 class="text-3xl font-bold text-gray-800">

                Gestión de Técnicos

            </h2>

            <p class="text-gray-500 mt-1">

                Administración del personal técnico

            </p>

        </div>

        <!-- Formulario -->
        <div class="bg-white rounded-xl shadow p-8 mb-8 max-w-4xl">

            <form
                id="tecnicoForm"
                class="grid grid-cols-1 md:grid-cols-3 gap-6"
            >

                <!-- Nombre -->
                <div>

                    <label class="block mb-2 font-bold text-gray-700">

                        Nombre Técnico

                    </label>

                    <input
                        type="text"
                        id="nombre"
                        required
                        class="w-full border border-gray-300 rounded-lg p-3"
                    >

                </div>

                <!-- Especialidad -->
                <div>

                    <label class="block mb-2 font-bold text-gray-700">

                        Especialidad

                    </label>

                    <input
                        type="text"
                        id="especialidad"
                        required
                        class="w-full border border-gray-300 rounded-lg p-3"
                    >

                </div>

                <!-- Teléfono -->
                <div>

                    <label class="block mb-2 font-bold text-gray-700">

                        Teléfono

                    </label>

                    <input
                        type="text"
                        id="telefono"
                        required
                        class="w-full border border-gray-300 rounded-lg p-3"
                    >

                </div>

                <!-- Botón -->
                <div class="md:col-span-3">

                    <button
                        type="submit"
                        class="bg-yellow-500 hover:bg-yellow-400 text-black font-bold px-6 py-4 rounded-lg transition"
                    >

                        Guardar Técnico

                    </button>

                </div>

            </form>

            <!-- Mensaje -->
            <div
                id="mensaje"
                class="mt-6 text-center font-bold"
            ></div>

        </div>

        <!-- Tabla -->
        <div class="bg-white rounded-xl shadow overflow-hidden">

            <table class="min-w-full">

                <thead class="bg-gray-800 text-white">

                    <tr>

                        <th class="px-6 py-4 text-left">

                            Técnico

                        </th>

                        <th class="px-6 py-4 text-left">

                            Especialidad

                        </th>

                        <th class="px-6 py-4 text-left">

                            Teléfono

                        </th>

                    </tr>

                </thead>

                <tbody id="tablaTecnicos">

                </tbody>

            </table>

        </div>

    </main>

</div>

<script type="module" src="../js/tecnicos.js"></script>

</body>
</html>
