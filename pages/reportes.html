<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Reportes Ejecutivos</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body class="bg-gray-100">

<div class="flex min-h-screen">

    <!-- SIDEBAR -->
    <aside class="w-72 bg-gray-900 text-white flex flex-col">

        <!-- Logo -->
        <div class="p-6 border-b border-gray-700">

            <div class="flex items-center gap-4">

                <img
                    src="../img/logo.png"
                    class="w-16 h-16 object-contain bg-white rounded-lg p-1"
                >

                <div>

                    <h1 class="font-bold text-lg">

                        Sistema Mantenimiento

                    </h1>

                    <p class="text-gray-400 text-sm">

                        Concretera del Sureste

                    </p>

                </div>

            </div>

        </div>

        <!-- Menú -->
        <nav class="flex-1 p-4">

            <ul class="space-y-3">

                <li>
                    <a href="./dashboard.html" class="block hover:bg-gray-700 px-4 py-3 rounded-lg">
                        📊 Dashboard
                    </a>
                </li>

                <li>
                    <a href="./nueva-orden.html" class="block hover:bg-gray-700 px-4 py-3 rounded-lg">
                        🛠 Nueva Orden
                    </a>
                </li>

                <li>
                    <a href="./historial.html" class="block hover:bg-gray-700 px-4 py-3 rounded-lg">
                        📁 Historial
                    </a>
                </li>

                <li>
                    <a href="./tecnicos.html" class="block hover:bg-gray-700 px-4 py-3 rounded-lg">
                        👷 Técnicos
                    </a>
                </li>

                <li>
                    <a href="./reportes.html" class="block bg-yellow-500 text-black px-4 py-3 rounded-lg font-bold">
                        📑 Reportes
                    </a>
                </li>

                <li>
                    <a href="./app-tecnico.html" class="block hover:bg-gray-700 px-4 py-3 rounded-lg">
                        📱 App Técnico
                    </a>
                </li>

            </ul>

        </nav>

    </aside>

    <!-- CONTENIDO -->
    <main class="flex-1 p-8">

        <!-- HEADER -->
        <div class="mb-8">

            <h2 class="text-3xl font-bold text-gray-800">

                Reportes Ejecutivos

            </h2>

            <p class="text-gray-500 mt-2">

                Generación automática de reportes gerenciales

            </p>

        </div>

        <!-- TARJETAS -->
        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">

            <!-- REPORTE GENERAL -->
            <div class="bg-white rounded-xl shadow p-6">

                <h3 class="text-2xl font-bold mb-3">

                    Reporte General

                </h3>

                <p class="text-gray-500 mb-6">

                    Genera reporte ejecutivo completo del sistema.

                </p>

                <button
                    onclick="generarReporte()"
                    class="w-full bg-blue-500 hover:bg-blue-600 text-white py-3 rounded-lg font-bold transition"
                >

                    Generar PDF

                </button>

            </div>

        </div>

    </main>

</div>

<script type="module" src="../js/reportes.js"></script>

</body>
</html>
