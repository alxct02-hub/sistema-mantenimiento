<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Historial de Órdenes</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body class="bg-gray-100">

<div class="flex min-h-screen">

    <!-- SIDEBAR -->
    <aside class="w-72 bg-gray-900 text-white flex flex-col">

        <!-- Logo -->
        <div class="p-6 border-b border-gray-700">

            <div class="flex items-center gap-4">

                <img
                    src="../img/logo.png"
                    alt="Logo"
                    class="w-16 h-16 object-contain bg-white rounded-lg p-1"
                >

                <div>

                    <h1 class="font-bold text-lg">

                        Sistema Mantenimiento

                    </h1>

                    <p class="text-gray-400 text-sm">

                        Concretera del Sureste

                    </p>

                </div>

            </div>

        </div>

        <!-- Menú -->
        <nav class="flex-1 p-4">

            <ul class="space-y-3">

                <li>

                    <a
                        href="./dashboard.html"
                        class="block hover:bg-gray-700 px-4 py-3 rounded-lg transition"
                    >

                        📊 Dashboard

                    </a>

                </li>

                <li>

                    <a
                        href="./nueva-orden.html"
                        class="block hover:bg-gray-700 px-4 py-3 rounded-lg transition"
                    >

                        🛠 Nueva Orden

                    </a>

                </li>

                <li>

                    <a
                        href="./historial.html"
                        class="block bg-yellow-500 text-black px-4 py-3 rounded-lg font-bold"
                    >

                        📁 Historial

                    </a>

                </li>

                <li>

                    <a
                        href="./tecnicos.html"
                        class="block hover:bg-gray-700 px-4 py-3 rounded-lg transition"
                    >

                        👷 Técnicos

                    </a>

                </li>

                <li>

                    <a
                        href="./reportes.html"
                        class="block hover:bg-gray-700 px-4 py-3 rounded-lg transition"
                    >

                        📑 Reportes

                    </a>

                </li>

                <li>

                    <a
                        href="./app-tecnico.html"
                        class="block hover:bg-gray-700 px-4 py-3 rounded-lg transition"
                    >

                        📱 App Técnico

                    </a>

                </li>

            </ul>

        </nav>

        <!-- Cerrar sesión -->
        <div class="p-4 border-t border-gray-700">

            <a
                href="../login.html"
                class="block bg-red-500 hover:bg-red-600 text-center py-3 rounded-lg font-bold transition"
            >

                Cerrar Sesión

            </a>

        </div>

    </aside>

    <!-- CONTENIDO -->
    <main class="flex-1 p-8">

        <!-- Header -->
        <div class="mb-8">

            <h2 class="text-3xl font-bold text-gray-800">

                Historial de Órdenes

            </h2>

            <p class="text-gray-500 mt-1">

                Consulta histórica de órdenes de servicio

            </p>

        </div>

        <!-- Tabla -->
        <div class="bg-white rounded-xl shadow overflow-hidden">

            <div class="overflow-auto">

                <table class="min-w-full">

                    <!-- Encabezados -->
                    <thead class="bg-gray-800 text-white">

                        <tr>

                            <th class="px-6 py-4 text-left">

                                Folio

                            </th>

                            <th class="px-6 py-4 text-left">

                                Equipo

                            </th>

                            <th class="px-6 py-4 text-left">

                                Técnico

                            </th>

                            <th class="px-6 py-4 text-left">

                                Prioridad

                            </th>

                            <th class="px-6 py-4 text-left">

                                Estado

                            </th>

                            <th class="px-6 py-4 text-left">

                                Fecha

                            </th>

                            <th class="px-6 py-4 text-center">

                                PDF

                            </th>

                        </tr>

                    </thead>

                    <!-- Body -->
                    <tbody
                        id="tablaHistorial"
                        class="bg-white"
                    >

                    </tbody>

                </table>

            </div>

        </div>

    </main>

</div>

<!-- Scripts -->
<script type="module" src="../js/historial.js"></script>

<script type="module" src="../js/pdf-orden.js"></script>

</body>
</html>
