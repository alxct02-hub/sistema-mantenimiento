<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Historial</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- XLSX -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</head>

<body class="bg-gray-100">

<div class="flex min-h-screen">

    <!-- SIDEBAR -->
    <aside class="w-72 bg-gray-900 text-white flex flex-col">

        <!-- LOGO -->
        <div class="p-6 border-b border-gray-700">

            <div class="flex items-center gap-4">

                <img
                    src="../img/logo.png"
                    class="w-16 h-16 object-contain bg-white rounded-lg p-1"
                >

                <div>

                    <h1 class="font-bold text-lg">

                        Sistema Mantenimiento

                    </h1>

                    <p class="text-gray-400 text-sm">

                        Concretera del Sureste

                    </p>

                </div>

            </div>

        </div>

        <!-- MENU -->
        <nav class="flex-1 p-4">

            <ul class="space-y-3">

                <li>
                    <a href="./dashboard.html" class="block hover:bg-gray-700 px-4 py-3 rounded-lg">
                        📊 Dashboard
                    </a>
                </li>

                <li>
                    <a href="./nueva-orden.html" class="block hover:bg-gray-700 px-4 py-3 rounded-lg">
                        🛠 Nueva Orden
                    </a>
                </li>

                <li>
                    <a href="./historial.html" class="block bg-yellow-500 text-black px-4 py-3 rounded-lg font-bold">
                        📁 Historial
                    </a>
                </li>

                <li>
                    <a href="./tecnicos.html" class="block hover:bg-gray-700 px-4 py-3 rounded-lg">
                        👷 Técnicos
                    </a>
                </li>

                <li>
                    <a href="./reportes.html" class="block hover:bg-gray-700 px-4 py-3 rounded-lg">
                        📑 Reportes
                    </a>
                </li>

            </ul>

        </nav>

    </aside>

    <!-- CONTENIDO -->
    <main class="flex-1 p-8">

        <!-- TITULO -->
        <div class="mb-8">

            <h2 class="text-3xl font-bold text-gray-800">

                Historial de Órdenes

            </h2>

            <p class="text-gray-500 mt-2">

                Consulta y exportación de información operativa

            </p>

        </div>

        <!-- FILTROS -->
        <div class="bg-white rounded-xl shadow p-6 mb-8">

            <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-5 gap-4">

                <!-- FECHA INICIO -->
                <div>

                    <label class="block mb-2 font-semibold">

                        Fecha inicio

                    </label>

                    <input
                        type="date"
                        id="fechaInicio"
                        class="w-full border rounded-lg p-3"
                    >

                </div>

                <!-- FECHA FIN -->
                <div>

                    <label class="block mb-2 font-semibold">

                        Fecha fin

                    </label>

                    <input
                        type="date"
                        id="fechaFin"
                        class="w-full border rounded-lg p-3"
                    >

                </div>

                <!-- EQUIPO -->
                <div>

                    <label class="block mb-2 font-semibold">

                        Equipo

                    </label>

                    <input
                        type="text"
                        id="filtroEquipo"
                        placeholder="Buscar equipo"
                        class="w-full border rounded-lg p-3"
                    >

                </div>

                <!-- TÉCNICO -->
                <div>

                    <label class="block mb-2 font-semibold">

                        Técnico

                    </label>

                    <input
                        type="text"
                        id="filtroTecnico"
                        placeholder="Buscar técnico"
                        class="w-full border rounded-lg p-3"
                    >

                </div>

                <!-- ESTADO -->
                <div>

                    <label class="block mb-2 font-semibold">

                        Estado

                    </label>

                    <select
                        id="filtroEstado"
                        class="w-full border rounded-lg p-3"
                    >

                        <option value="">

                            Todos

                        </option>

                        <option value="Pendiente">

                            Pendiente

                        </option>

                        <option value="En proceso">

                            En proceso

                        </option>

                        <option value="Completada">

                            Completada

                        </option>

                    </select>

                </div>

            </div>

            <!-- BOTONES -->
            <div class="flex flex-wrap gap-4 mt-6">

                <button
                    onclick="aplicarFiltros()"
                    class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-3 rounded-lg font-bold"
                >

                    Filtrar

                </button>

                <button
                    onclick="limpiarFiltros()"
                    class="bg-gray-500 hover:bg-gray-600 text-white px-6 py-3 rounded-lg font-bold"
                >

                    Limpiar

                </button>

                <button
                    onclick="exportarExcel()"
                    class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-lg font-bold"
                >

                    Descargar Excel

                </button>

            </div>

        </div>

        <!-- TABLA -->
        <div class="bg-white rounded-xl shadow overflow-auto">

            <table class="w-full">

                <thead class="bg-gray-900 text-white">

                    <tr>

                        <th class="px-4 py-4 text-left">

                            Folio

                        </th>

                        <th class="px-4 py-4 text-left">

                            Equipo

                        </th>

                        <th class="px-4 py-4 text-left">

                            Técnico

                        </th>

                        <th class="px-4 py-4 text-left">

                            Tipo

                        </th>

                        <th class="px-4 py-4 text-left">

                            Prioridad

                        </th>

                        <th class="px-4 py-4 text-left">

                            Estado

                        </th>

                        <th class="px-4 py-4 text-left">

                            Fecha

                        </th>

                    </tr>

                </thead>

                <tbody
                    id="tablaHistorial"
                    class="divide-y"
                >

                </tbody>

            </table>

        </div>

    </main>

</div>

<script type="module" src="../js/historial.js"></script>

</body>
</html>
