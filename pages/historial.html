<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>Historial</title>

<!-- TAILWIND -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- JSPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- XLSX -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</head>

<body class="bg-gray-100 min-h-screen">

<div class="p-8">

    <!-- HEADER CON BOTÓN ATRÁS -->
    <div class="mb-8">

        <div class="flex justify-between items-center">

            <div>

                <h1 class="text-4xl font-bold text-gray-800">

                    Historial de Órdenes

                </h1>

                <p class="text-gray-500 mt-2">

                    Seguimiento y control histórico

                </p>

            </div>

            <div class="flex gap-3">

                <button
                    onclick="window.location.href='./dashboard.html'"
                    class="bg-yellow-500 hover:bg-yellow-600 text-black px-4 py-3 rounded-xl font-bold transition"
                >

                    ← Atrás

                </button>

                <button
                    onclick="exportarExcel()"
                    class="bg-green-600 hover:bg-green-700 text-white px-5 py-3 rounded-xl"
                >

                    Exportar Excel

                </button>

            </div>

        </div>

    </div>

    <!-- FILTROS -->
    <div class="bg-white p-6 rounded-2xl shadow-lg mb-8">

        <div class="grid md:grid-cols-4 gap-4">

            <!-- FECHA INICIO -->
            <div>

                <label class="block mb-2 font-bold">

                    Fecha inicio

                </label>

                <input
                    type="date"
                    id="fechaInicioFiltro"
                    class="w-full border p-3 rounded-lg"
                >

            </div>

            <!-- FECHA FIN -->
            <div>

                <label class="block mb-2 font-bold">

                    Fecha fin

                </label>

                <input
                    type="date"
                    id="fechaFinFiltro"
                    class="w-full border p-3 rounded-lg"
                >

            </div>

            <!-- EQUIPO -->
            <div>

                <label class="block mb-2 font-bold">

                    Equipo

                </label>

                <input
                    type="text"
                    id="equipoFiltro"
                    placeholder="Buscar equipo"
                    class="w-full border p-3 rounded-lg"
                >

            </div>

            <!-- ESTADO -->
            <div>

                <label class="block mb-2 font-bold">

                    Estado

                </label>

                <select
                    id="estadoFiltro"
                    class="w-full border p-3 rounded-lg"
                >

                    <option value="">

                        Todos

                    </option>

                    <option value="Pendiente">

                        Pendiente

                    </option>

                    <option value="En Proceso">

                        En Proceso

                    </option>

                    <option value="Completada">

                        Completada

                    </option>

                </select>

            </div>

        </div>

        <!-- BOTON -->
        <div class="mt-6">

            <button
                onclick="aplicarFiltros()"
                class="bg-yellow-500 hover:bg-yellow-600 px-6 py-3 rounded-xl font-bold"
            >

                Aplicar filtros

            </button>

        </div>

    </div>

    <!-- TABLA -->
    <div class="bg-white rounded-2xl shadow-lg overflow-hidden">

        <div class="overflow-x-auto">

            <table class="w-full">

                <thead class="bg-gray-900 text-white">

                    <tr>

                        <th class="px-4 py-4 text-left">

                            Folio

                        </th>

                        <th class="px-4 py-4 text-left">

                            Equipo

                        </th>

                        <th class="px-4 py-4 text-left">

                            Técnico

                        </th>

                        <th class="px-4 py-4 text-left">

                            Estado

                        </th>

                        <th class="px-4 py-4 text-left">

                            Inicio

                        </th>

                        <th class="px-4 py-4 text-left">

                            Fin

                        </th>

                        <th class="px-4 py-4 text-left">

                            Tiempo Laboral

                        </th>

                        <th class="px-4 py-4 text-left">

                            PDF

                        </th>

                    </tr>

                </thead>

                <tbody
                    id="tablaHistorial"
                    class="bg-white"
                >

                </tbody>

            </table>

        </div>

    </div>

</div>

<!-- HISTORIAL -->
<script type="module" src="../js/historial.js"></script>

</body>

</html>
