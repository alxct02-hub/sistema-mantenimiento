<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Nueva Orden</title>

  <link rel="stylesheet" href="../css/ordenes.css">

</head>

<body>

  <div class="contenedor">

    <h1>CONCRETERA DEL SURESTE</h1>

    <h2>Nueva Orden de Servicio</h2>

    <form id="ordenForm">

      <input type="text" id="folio" placeholder="Folio" readonly>

      <input type="text" id="area" placeholder="Área">

      <input type="text" id="equipo" placeholder="Equipo">

      <select id="prioridad">

        <option value="">Prioridad</option>

        <option>Alta</option>

        <option>Media</option>

        <option>Baja</option>

      </select>

      <textarea id="descripcion"
      placeholder="Descripción de falla"></textarea>

      <button type="submit">

        Guardar Orden

      </button>

    </form>

  </div>

  <script type="module" src="../js/ordenes.js"></script>

</body>
</html>
