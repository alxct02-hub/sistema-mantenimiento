<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Nueva Orden</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<div class="flex min-h-screen">

    <!-- Sidebar -->
    <aside class="w-72 bg-gray-900 text-white flex flex-col">

        <!-- Logo -->
        <div class="p-6 border-b border-gray-700">

            <div class="flex items-center gap-4">

                <img
                    src="../img/logo.png"
                    alt="Logo"
                    class="w-16 h-16 object-contain bg-white rounded-lg p-1"
                >

                <div>

                    <h1 class="font-bold text-lg">

                        Sistema Mantenimiento

                    </h1>

                    <p class="text-gray-400 text-sm">

                        Concretera del Sureste

                    </p>

                </div>

            </div>

        </div>

        <!-- Menú -->
        <nav class="flex-1 p-4">

            <ul class="space-y-3">

                <li>

                    <a
                        href="./dashboard.html"
                        class="block hover:bg-gray-700 px-4 py-3 rounded-lg transition"
                    >

                        📊 Dashboard

                    </a>

                </li>

                <li>

                    <a
                        href="./nueva-orden.html"
                        class="block bg-yellow-500 text-black px-4 py-3 rounded-lg font-bold"
                    >

                        🛠 Nueva Orden

                    </a>

                </li>

                <li>

                    <a
                        href="./historial.html"
                        class="block hover:bg-gray-700 px-4 py-3 rounded-lg transition"
                    >

                        📁 Historial

                    </a>

                </li>

                <li>

                    <a
                        href="./tecnicos.html"
                        class="block hover:bg-gray-700 px-4 py-3 rounded-lg transition"
                    >

                        👷 Técnicos

                    </a>

                </li>

                <li>

                    <a
                        href="./reportes.html"
                        class="block hover:bg-gray-700 px-4 py-3 rounded-lg transition"
                    >

                        📑 Reportes

                    </a>

                </li>

            </ul>

        </nav>

        <!-- Salir -->
        <div class="p-4 border-t border-gray-700">

            <a
                href="../login.html"
                class="block bg-red-500 hover:bg-red-600 text-center py-3 rounded-lg font-bold transition"
            >

                Cerrar Sesión

            </a>

        </div>

    </aside>

    <!-- Contenido -->
    <main class="flex-1 p-8">

        <!-- Header -->
        <div class="mb-8">

            <h2 class="text-3xl font-bold text-gray-800">

                Nueva Orden de Servicio

            </h2>

            <p class="text-gray-500 mt-1">

                Registro operativo de mantenimiento

            </p>

        </div>

        <!-- Formulario -->
        <div class="bg-white rounded-xl shadow p-8 max-w-6xl">

            <form
                id="ordenForm"
                class="grid grid-cols-1 md:grid-cols-3 gap-6"
            >

                <!-- Folio -->
                <div>

                    <label class="block mb-2 font-bold text-gray-700">

                        Folio

                    </label>

                    <input
                        type="text"
                        id="folio"
                        readonly
                        class="w-full border border-gray-300 rounded-lg p-3 bg-gray-100"
                    >

                </div>

                <!-- Área -->
                <div>

                    <label class="block mb-2 font-bold text-gray-700">

                        Área

                    </label>

                    <input
                        type="text"
                        id="area"
                        required
                        class="w-full border border-gray-300 rounded-lg p-3"
                    >

                </div>

                <!-- Equipo -->
                <div>

                    <label class="block mb-2 font-bold text-gray-700">

                        Equipo

                    </label>

                    <input
                        type="text"
                        id="equipo"
                        required
                        class="w-full border border-gray-300 rounded-lg p-3"
                    >

                </div>

                <!-- Kilometraje -->
                <div>

                    <label class="block mb-2 font-bold text-gray-700">

                        Kilometraje

                    </label>

                    <input
                        type="number"
                        id="kilometraje"
                        class="w-full border border-gray-300 rounded-lg p-3"
                    >

                </div>

                <!-- Horómetro -->
                <div>

                    <label class="block mb-2 font-bold text-gray-700">

                        Horómetro

                    </label>

                    <input
                        type="number"
                        id="horometro"
                        class="w-full border border-gray-300 rounded-lg p-3"
                    >

                </div>

                <!-- Operador -->
                <div>

                    <label class="block mb-2 font-bold text-gray-700">

                        Operador

                    </label>

                    <input
                        type="text"
                        id="operador"
                        class="w-full border border-gray-300 rounded-lg p-3"
                    >

                </div>

                <!-- Técnico -->
                <div>

                    <label class="block mb-2 font-bold text-gray-700">

                        Técnico

                    </label>

                    <input
                        type="text"
                        id="tecnico"
                        required
                        class="w-full border border-gray-300 rounded-lg p-3"
                    >

                </div>

                <!-- Tipo -->
                <div>

                    <label class="block mb-2 font-bold text-gray-700">

                        Tipo

                    </label>

                    <select
                        id="tipo"
                        required
                        class="w-full border border-gray-300 rounded-lg p-3"
                    >

                        <option value="">

                            Seleccionar

                        </option>

                        <option value="Preventivo">

                            Preventivo

                        </option>

                        <option value="Correctivo">

                            Correctivo

                        </option>

                    </select>

                </div>

                <!-- Prioridad -->
                <div>

                    <label class="block mb-2 font-bold text-gray-700">

                        Prioridad

                    </label>

                    <select
                        id="prioridad"
                        required
                        class="w-full border border-gray-300 rounded-lg p-3"
                    >

                        <option value="">

                            Seleccionar

                        </option>

                        <option value="Alta">

                            Alta

                        </option>

                        <option value="Media">

                            Media

                        </option>

                        <option value="Baja">

                            Baja

                        </option>

                    </select>

                </div>

                <!-- Descripción -->
                <div class="md:col-span-3">

                    <label class="block mb-2 font-bold text-gray-700">

                        Descripción

                    </label>

                    <textarea
                        id="descripcion"
                        rows="5"
                        required
                        class="w-full border border-gray-300 rounded-lg p-3"
                    ></textarea>

                </div>

                <!-- Botón -->
                <div class="md:col-span-3">

                    <button
                        type="submit"
                        class="bg-yellow-500 hover:bg-yellow-400 text-black font-bold px-6 py-4 rounded-lg transition"
                    >

                        Guardar Orden

                    </button>

                </div>

            </form>

            <!-- Mensaje -->
            <div
                id="mensaje"
                class="mt-6 text-center font-bold"
            ></div>

        </div>

    </main>

</div>

<script type="module" src="../js/ordenes.js"></script>

</body>
</html>
