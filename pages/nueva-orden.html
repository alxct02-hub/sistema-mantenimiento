<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>Nueva Orden</title>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>

<!-- TAILWIND -->
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 p-8">

<div class="max-w-4xl mx-auto bg-white p-8 rounded-2xl shadow-lg">

    <h1 class="text-3xl font-bold mb-8">

        Nueva Orden de Servicio

    </h1>

    <form id="formOrden" class="space-y-6">

        <!-- FOLIO -->
        <div>

            <label class="block mb-2 font-bold">

                Folio

            </label>

            <input
                type="text"
                id="folio"
                readonly
                class="w-full border p-3 rounded-lg bg-gray-100"
            >

        </div>

        <!-- EQUIPO -->
        <div>

            <label class="block mb-2 font-bold">

                Equipo

            </label>

            <input
                type="text"
                id="equipo"
                required
                class="w-full border p-3 rounded-lg"
            >

        </div>

        <!-- TÉCNICO -->
        <div>

            <label class="block mb-2 font-bold">

                Técnico

            </label>

            <input
                type="text"
                id="tecnico"
                required
                class="w-full border p-3 rounded-lg"
            >

        </div>

        <!-- PRIORIDAD -->
        <div>

            <label class="block mb-2 font-bold">

                Prioridad

            </label>

            <select
                id="prioridad"
                class="w-full border p-3 rounded-lg"
            >

                <option>Alta</option>
                <option>Media</option>
                <option>Baja</option>

            </select>

        </div>

        <!-- DESCRIPCIÓN -->
        <div>

            <label class="block mb-2 font-bold">

                Descripción

            </label>

            <textarea
                id="descripcion"
                rows="5"
                class="w-full border p-3 rounded-lg"
            ></textarea>

        </div>

        <!-- BOTÓN -->
        <button
            type="submit"
            class="bg-yellow-500 hover:bg-yellow-600 text-black font-bold px-6 py-3 rounded-lg"
        >

            Guardar Orden

        </button>

    </form>

</div>

<!-- FIREBASE -->
<script src="../js/firebase-config.js?v=12"></script>

<!-- ORDENES -->
<script src="../js/ordenes.js?v=12"></script>

</body>

</html>
