<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Nueva Orden</title>

    <link rel="stylesheet" href="../css/panel.css">

</head>

<body>

<div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">

        <div class="logo-area">

            <img
                src="../img/logo.png"
                alt="Logo"
            >

            <div>

                <h1>Sistema Mantenimiento</h1>

                <p>Concretera del Sureste</p>

            </div>

        </div>

        <nav class="menu">

            <ul>

                <li>

                    <a href="./dashboard.html">

                        📊 Dashboard

                    </a>

                </li>

                <li>

                    <a
                        href="./nueva-orden.html"
                        class="activo"
                    >

                        🛠 Nueva Orden

                    </a>

                </li>

                <li>

                    <a href="./historial.html">

                        📁 Historial

                    </a>

                </li>

                <li>

                    <a href="./tecnicos.html">

                        👷 Técnicos

                    </a>

                </li>

                <li>

                    <a href="./reportes.html">

                        📑 Reportes

                    </a>

                </li>

            </ul>

        </nav>

        <div class="logout">

            <a href="../login.html">

                Cerrar Sesión

            </a>

        </div>

    </aside>

    <!-- Contenido -->
    <main class="main-content">

        <div class="page-header">

            <div>

                <h2>Nueva Orden</h2>

                <p>Registro de orden de servicio</p>

            </div>

        </div>

        <!-- Formulario -->
        <div class="form-container">

            <form id="ordenForm">

                <label>Folio</label>

                <input
                    type="text"
                    id="folio"
                    readonly
                >

                <label>Área</label>

                <input
                    type="text"
                    id="area"
                    required
                >

                <label>Equipo</label>

                <input
                    type="text"
                    id="equipo"
                    required
                >

                <label>Técnico</label>

                <input
                    type="text"
                    id="tecnico"
                    required
                >

                <label>Tipo</label>

                <select id="tipo" required>

                    <option value="">

                        Seleccionar

                    </option>

                    <option value="Preventivo">

                        Preventivo

                    </option>

                    <option value="Correctivo">

                        Correctivo

                    </option>

                </select>

                <label>Prioridad</label>

                <select id="prioridad" required>

                    <option value="">

                        Seleccionar

                    </option>

                    <option value="Alta">

                        Alta

                    </option>

                    <option value="Media">

                        Media

                    </option>

                    <option value="Baja">

                        Baja

                    </option>

                </select>

                <label>Descripción</label>

                <textarea
                    id="descripcion"
                    rows="5"
                    required
                ></textarea>

                <button
                    type="submit"
                    class="btn"
                    style="margin-top:25px;"
                >

                    Guardar Orden

                </button>

            </form>

            <div
                id="mensaje"
                style="
                    margin-top:20px;
                    font-weight:bold;
                    text-align:center;
                "
            ></div>

        </div>

    </main>

</div>

<script type="module" src="../js/ordenes.js"></script>

</body>
</html>
