<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presolicitudes - Sistema Mantenimiento</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="flex min-h-screen">

    <!-- Sidebar -->
    <aside class="w-72 bg-gray-900 text-white flex flex-col">

        <div class="p-6 border-b border-gray-700">
            <div class="flex items-center gap-4">
                <img src="../img/logo.png" alt="Logo" class="w-16 h-16 object-contain bg-white rounded-lg p-1">
                <div>
                    <h1 class="font-bold text-lg">Sistema Mantenimiento</h1>
                    <p class="text-gray-400 text-sm">Concretera del Sureste</p>
                </div>
            </div>
        </div>

        <!-- Info usuario -->
        <div class="px-4 pt-4">
            <div class="bg-gray-800 rounded-lg p-3">
                <p id="nombreUsuario" class="font-bold text-yellow-400 text-sm"></p>
                <p id="rolUsuario" class="text-gray-400 text-xs mt-1"></p>
            </div>
        </div>

        <!-- Menú Jefe de Planta -->
        <nav class="flex-1 p-4">
            <ul class="space-y-3">
                <li>
                    <a href="./presolicitudes.html" class="block bg-yellow-500 text-black px-4 py-3 rounded-lg font-bold">
                        📝 Mis Solicitudes
                    </a>
                </li>
                <li>
                    <a href="./mis-ordenes.html" class="block hover:bg-gray-700 px-4 py-3 rounded-lg transition">
                        📋 Estado de mis Órdenes
                    </a>
                </li>
                <!-- Solo visible para admin -->
                <li id="menuAdmin" class="hidden">
                    <a href="./dashboard.html" class="block hover:bg-gray-700 px-4 py-3 rounded-lg transition">
                        📊 Dashboard
                    </a>
                </li>
            </ul>
        </nav>

        <div class="p-4 border-t border-gray-700">
            <button id="btnCerrarSesion" class="w-full bg-red-500 hover:bg-red-600 text-center py-3 rounded-lg font-bold transition">
                Cerrar Sesión
            </button>
        </div>

    </aside>

    <!-- Contenido -->
    <main class="flex-1 p-8">

        <div class="mb-8 flex justify-between items-center">
            <div>
                <h2 class="text-3xl font-bold text-gray-800">Presolicitudes de Mantenimiento</h2>
                <p class="text-gray-500 mt-1">Crea y gestiona solicitudes de órdenes de servicio</p>
            </div>
            <button id="btnNuevaPresolicitud" class="bg-yellow-500 hover:bg-yellow-400 text-black font-bold px-6 py-3 rounded-lg transition">
                ➕ Nueva Presolicitud
            </button>
        </div>

        <!-- Filtros -->
        <div class="bg-white rounded-xl shadow p-4 mb-6">
            <div class="flex gap-4 flex-wrap">
                <select id="filtroEstado" class="border border-gray-300 rounded-lg px-4 py-2">
                    <option value="">Todos los estados</option>
                    <option value="draft">Borradores</option>
                    <option value="convertida">Convertidas</option>
                </select>
            </div>
        </div>

        <!-- Lista -->
        <div id="contenedorPresolicitudes" class="grid gap-6"></div>

    </main>

</div>

<!-- ====== MODAL: NUEVA PRESOLICITUD ====== -->
<div id="modalPresolicitud" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">

    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[90vh] overflow-y-auto">

        <div class="sticky top-0 bg-white z-10 flex justify-between items-center px-8 py-5 border-b">
            <h3 class="text-2xl font-bold text-gray-800">Nueva Presolicitud</h3>
            <button id="btnCerrarModal" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">✕</button>
        </div>

        <form id="formPresolicitud" class="p-8 grid grid-cols-1 md:grid-cols-3 gap-6">

            <!-- Folio -->
            <div>
                <label class="block mb-2 font-bold text-gray-700 text-sm">Folio</label>
                <input type="text" id="folioPresolicitud" readonly
                    class="w-full border border-gray-300 rounded-lg p-3 bg-gray-100 font-mono font-bold text-gray-600">
            </div>

            <!-- Área -->
            <div>
                <label class="block mb-2 font-bold text-gray-700 text-sm">Área <span class="text-red-500">*</span></label>
                <input type="text" id="areaPresolicitud" placeholder="Ej: Producción" required
                    class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-yellow-400">
            </div>

            <!-- Equipo -->
            <div>
                <label class="block mb-2 font-bold text-gray-700 text-sm">Equipo <span class="text-red-500">*</span></label>
                <input type="text" id="equipoPresolicitud" placeholder="Ej: Bomba 01" required
                    class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-yellow-400">
            </div>

            <!-- Kilometraje -->
            <div>
                <label class="block mb-2 font-bold text-gray-700 text-sm">Kilometraje</label>
                <input type="number" id="kilometrajePresolicitud" placeholder="0"
                    class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-yellow-400">
            </div>

            <!-- Horómetro -->
            <div>
                <label class="block mb-2 font-bold text-gray-700 text-sm">Horómetro</label>
                <input type="number" id="horometroPresolicitud" placeholder="0"
                    class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-yellow-400">
            </div>

            <!-- Operador -->
            <div>
                <label class="block mb-2 font-bold text-gray-700 text-sm">Operador</label>
                <input type="text" id="operadorPresolicitud" placeholder="Nombre del operador"
                    class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-yellow-400">
            </div>

            <!-- Técnico sugerido -->
            <div>
                <label class="block mb-2 font-bold text-gray-700 text-sm">Técnico sugerido</label>
                <input type="text" id="tecnicoPresolicitud" placeholder="Técnico recomendado"
                    class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-yellow-400">
            </div>

            <!-- Tipo -->
            <div>
                <label class="block mb-2 font-bold text-gray-700 text-sm">Tipo <span class="text-red-500">*</span></label>
                <select id="tipoPresolicitud" required
                    class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-yellow-400">
                    <option value="">Seleccionar</option>
                    <option value="Preventivo">Preventivo</option>
                    <option value="Correctivo">Correctivo</option>
                </select>
            </div>

            <!-- Prioridad -->
            <div>
                <label class="block mb-2 font-bold text-gray-700 text-sm">Prioridad <span class="text-red-500">*</span></label>
                <select id="prioridadPresolicitud" required
                    class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-yellow-400">
                    <option value="">Seleccionar</option>
                    <option value="Alta">Alta</option>
                    <option value="Media">Media</option>
                    <option value="Baja">Baja</option>
                </select>
            </div>

            <!-- Descripción (ancho completo) -->
            <div class="md:col-span-3">
                <label class="block mb-2 font-bold text-gray-700 text-sm">Descripción del Problema <span class="text-red-500">*</span></label>
                <textarea id="descripcionPresolicitud" rows="4" required
                    placeholder="Describe el problema o necesidad de mantenimiento..."
                    class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-yellow-400 resize-none"></textarea>
            </div>

            <!-- Botones -->
            <div class="md:col-span-3 flex gap-4">
                <button type="submit"
                    class="flex-1 bg-yellow-500 hover:bg-yellow-400 text-black font-bold px-6 py-3 rounded-lg transition">
                    Guardar Presolicitud
                </button>
                <button type="button" id="btnCancelarModal"
                    class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold px-6 py-3 rounded-lg transition">
                    Cancelar
                </button>
            </div>

        </form>

        <div id="mensajePresolicitud" class="px-8 pb-6 text-center font-bold"></div>

    </div>

</div>

<!-- ====== MODAL: DETALLES ====== -->
<div id="modalDetalles" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">

    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">

        <div class="flex justify-between items-center px-8 py-5 border-b">
            <h3 class="text-2xl font-bold text-gray-800">Detalles de Presolicitud</h3>
            <button id="btnCerrarDetalles" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">✕</button>
        </div>

        <div id="contenidoDetalles" class="p-8 space-y-4"></div>
        <div id="botonesAccion" class="px-8 pb-8 flex gap-4 flex-wrap"></div>

    </div>

</div>

<script type="module" src="../js/presolicitudes.js"></script>

<script type="module">
    const sesion = localStorage.getItem('sesion');
    if (sesion) {
        const datos = JSON.parse(sesion);
        const nombreEl = document.getElementById('nombreUsuario');
        const rolEl    = document.getElementById('rolUsuario');
        if (nombreEl) nombreEl.textContent = datos.nombre || datos.usuario;
        if (rolEl) {
            rolEl.textContent = datos.rol === 'admin' ? 'Administrador' :
                                datos.rol === 'jefe_planta' ? 'Jefe de Planta' : datos.rol;
        }
        if (datos.rol === 'admin') {
            const menuAdmin = document.getElementById('menuAdmin');
            if (menuAdmin) menuAdmin.classList.remove('hidden');
        }
    }
</script>

</body>
</html>
