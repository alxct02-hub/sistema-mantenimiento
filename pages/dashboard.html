<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

    <!-- Header -->
    <header class="bg-gray-900 text-white p-5 flex justify-between items-center">

        <h1 class="text-2xl font-bold">

            Sistema de Mantenimiento

        </h1>

        <a href="../login.html"
           class="bg-red-500 px-4 py-2 rounded">

            Salir

        </a>

    </header>

    <!-- Contenido -->
    <main class="p-6">

        <!-- Tarjetas -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">

            <div class="bg-white p-6 rounded shadow">

                <h2 class="text-gray-500">

                    Total Órdenes

                </h2>

                <p id="totalOrdenes"
                   class="text-4xl font-bold mt-2">

                    0

                </p>

            </div>

            <div class="bg-white p-6 rounded shadow">

                <h2 class="text-gray-500">

                    Pendientes

                </h2>

                <p id="pendientes"
                   class="text-4xl font-bold mt-2 text-yellow-500">

                    0

                </p>

            </div>

            <div class="bg-white p-6 rounded shadow">

                <h2 class="text-gray-500">

                    Completadas

                </h2>

                <p id="completadas"
                   class="text-4xl font-bold mt-2 text-green-500">

                    0

                </p>

            </div>

        </div>

        <!-- Botón nueva orden -->
        <div class="mb-6">

            <a href="./nueva-orden.html"
               class="bg-yellow-500 text-black px-5 py-3 rounded font-bold">

                + Nueva Orden

            </a>

        </div>

        <!-- Tabla -->
        <div class="bg-white rounded shadow overflow-auto">

            <table class="min-w-full">

                <thead class="bg-gray-800 text-white">

                    <tr>

                        <th class="px-6 py-4 text-left">

                            Equipo

                        </th>

                        <th class="px-6 py-4 text-left">

                            Técnico

                        </th>

                        <th class="px-6 py-4 text-left">

                            Tipo

                        </th>

                        <th class="px-6 py-4 text-left">

                            Prioridad

                        </th>

                        <th class="px-6 py-4 text-left">

                            Estado

                        </th>

                        <th class="px-6 py-4 text-left">

                            Fecha

                        </th>

                        <th class="px-6 py-4 text-center">

                            Acción

                        </th>

                    </tr>

                </thead>

                <tbody id="tablaOrdenes">

                </tbody>

            </table>

        </div>

    </main>

    <script type="module" src="../js/dashboard.js"></script>

</body>
</html>
