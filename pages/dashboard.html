<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Dashboard</title>

    <!-- FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>

    <!-- TAILWIND -->
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

    <!-- HEADER -->
    <header class="bg-gray-900 text-white p-4 shadow-lg">

        <div class="flex justify-between items-center">

            <div class="flex items-center gap-4">

                <img
                    src="../img/logo.png"
                    class="w-14 h-14 bg-white rounded-lg p-1"
                >

                <div>

                    <h1 class="text-2xl font-bold">

                        Dashboard Mantenimiento

                    </h1>

                    <p class="text-gray-400">

                        Concretera del Sureste

                    </p>

                </div>

            </div>

            <a
                href="../index.html"
                class="bg-red-500 px-4 py-2 rounded-lg hover:bg-red-600"
            >

                Cerrar Sesión

            </a>

        </div>

    </header>

    <!-- CONTENIDO -->
    <main class="p-6">

        <!-- KPI -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">

            <!-- TOTAL -->
            <div class="bg-white rounded-2xl p-6 shadow-lg">

                <h2 class="text-gray-500">

                    Total Órdenes

                </h2>

                <p
                    id="totalOrdenes"
                    class="text-4xl font-bold mt-2"
                >

                    0

                </p>

            </div>

            <!-- PENDIENTES -->
            <div class="bg-white rounded-2xl p-6 shadow-lg">

                <h2 class="text-gray-500">

                    Pendientes

                </h2>

                <p
                    id="pendientes"
                    class="text-4xl font-bold mt-2 text-yellow-500"
                >

                    0

                </p>

            </div>

            <!-- COMPLETADAS -->
            <div class="bg-white rounded-2xl p-6 shadow-lg">

                <h2 class="text-gray-500">

                    Completadas

                </h2>

                <p
                    id="completadas"
                    class="text-4xl font-bold mt-2 text-green-600"
                >

                    0

                </p>

            </div>

            <!-- PROCESO -->
            <div class="bg-white rounded-2xl p-6 shadow-lg">

                <h2 class="text-gray-500">

                    En Proceso

                </h2>

                <p
                    id="enProceso"
                    class="text-4xl font-bold mt-2 text-blue-600"
                >

                    0

                </p>

            </div>

        </div>

        <!-- TABLA -->
        <div class="bg-white rounded-2xl shadow-lg overflow-hidden">

            <div class="p-5 border-b">

                <h2 class="text-2xl font-bold">

                    Órdenes de Servicio

                </h2>

            </div>

            <div class="overflow-x-auto">

                <table class="w-full">

                    <thead class="bg-gray-800 text-white">

                        <tr>

                            <th class="px-4 py-3 text-left">

                                Folio

                            </th>

                            <th class="px-4 py-3 text-left">

                                Equipo

                            </th>

                            <th class="px-4 py-3 text-left">

                                Tipo

                            </th>

                            <th class="px-4 py-3 text-left">

                                Técnico

                            </th>

                            <th class="px-4 py-3 text-left">

                                Prioridad

                            </th>

                            <th class="px-4 py-3 text-left">

                                Estado

                            </th>

                            <th class="px-4 py-3 text-left">

                                Fecha

                            </th>

                        </tr>

                    </thead>

                    <tbody id="tablaOrdenes">

                    </tbody>

                </table>

            </div>

        </div>

    </main>

    <!-- FIREBASE CONFIG -->
    <script src="../js/firebase-config.js"></script>

    <!-- DASHBOARD -->
    <script src="../js/dashboard.js"></script>

</body>

</html>
